<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
	<title>Happy Women's Day 🌸</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		html {
			height: -webkit-fill-available;
		}

		body {
			width: 100%;
			min-height: 100vh;
			min-height: -webkit-fill-available;
			min-height: 100dvh;
			overflow: hidden;
			background: #000;
			font-family: 'Quicksand', sans-serif;
			touch-action: none;
			padding-top: env(safe-area-inset-top);
			padding-bottom: env(safe-area-inset-bottom);
			padding-left: env(safe-area-inset-left);
			padding-right: env(safe-area-inset-right);
		}

		#c2d {
			display: block;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
		}

		#c3d {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			pointer-events: none;
		}

		#c3d.active {
			display: block;
			pointer-events: all;
		}

		.screen {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity 1s ease;
		}

		.screen.active {
			opacity: 1;
			pointer-events: all;
		}

		#phaseLoading {
			background: transparent
		}

		.loadText {
			color: #ffffff;
			font-family: 'Dancing Script', cursive;
			letter-spacing: 2px;
			font-size: 34px;
			text-shadow: 0 0 16px rgba(255, 100, 180, 1), 0 0 40px rgba(255, 50, 150, 0.8);
		}

		.loadBarWrap {
			width: 200px;
			height: 3px;
			background: rgba(255, 130, 190, .2);
			border-radius: 10px;
			margin-top: 24px;
			overflow: hidden;
		}

		.loadBar {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, #ff6eb4, #ff1493);
			border-radius: 10px;
			box-shadow: 0 0 8px rgba(255, 100, 180, .8);
			transition: width .1s linear;
		}

		#phaseHold {
			justify-content: flex-end;
			padding-bottom: calc(90px + env(safe-area-inset-bottom));
		}

		#holdWrap {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 28px;
		}

		#holdHint {
			color: rgba(255, 182, 193, .85);
			font-size: 13px;
			letter-spacing: 3px;
			text-transform: uppercase;
			text-shadow: 0 0 12px rgba(255, 100, 180, .6);
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {

			0%,
			100% {
				opacity: .5
			}

			50% {
				opacity: 1
			}
		}

		#holdBtn {
			position: relative;
			width: 80px;
			height: 80px;
			cursor: pointer;
			user-select: none;
			-webkit-user-select: none;
		}

		.ring {
			position: absolute;
			inset: 0;
			border-radius: 50%;
			border: 1.5px solid rgba(255, 130, 190, .35);
			animation: ringPulse 2.5s ease-in-out infinite;
		}

		.ring:nth-child(2) {
			animation-delay: .6s;
			transform: scale(1.28);
		}

		.ring:nth-child(3) {
			animation-delay: 1.2s;
			transform: scale(1.58);
		}

		@keyframes ringPulse {

			0%,
			100% {
				opacity: .2
			}

			50% {
				opacity: .75
			}
		}

		.dot {
			position: absolute;
			inset: 8px;
			border-radius: 50%;
			background: radial-gradient(circle at 40% 35%, #ff9ec4, #d9006e 60%, #8b0038);
			box-shadow: 0 0 18px 6px rgba(255, 80, 160, .55), 0 0 40px 12px rgba(200, 0, 120, .25);
			transition: transform .15s, box-shadow .15s;
		}

		#holdBtn.pressing .dot {
			transform: scale(.88);
			box-shadow: 0 0 28px 12px rgba(255, 80, 160, .85), 0 0 60px 20px rgba(200, 0, 120, .45);
		}

		#progressRing {
			position: absolute;
			inset: -4px;
			width: calc(100% + 8px);
			height: calc(100% + 8px);
			transform: rotate(-90deg);
			pointer-events: none;
		}

		#progressCircle {
			fill: none;
			stroke: url(#grad);
			stroke-width: 2.5;
			stroke-linecap: round;
			stroke-dasharray: 263;
			stroke-dashoffset: 263;
			transition: stroke-dashoffset .05s linear;
			filter: drop-shadow(0 0 4px rgba(255, 100, 180, 1));
		}

		#phaseText {
			background: transparent;
			pointer-events: none;
		}

		#btnContinue {
			position: fixed;
			bottom: calc(28px + env(safe-area-inset-bottom));
			left: 50%;
			transform: translateX(-50%);
			padding: 0;
			background: none;
			color: rgba(255, 255, 255, .75);
			font-family: 'Quicksand', sans-serif;
			font-size: 14px;
			letter-spacing: 2px;
			border: none;
			cursor: pointer;
			opacity: 0;
			pointer-events: none;
			transition: opacity .7s ease, color .2s, transform .15s;
			z-index: 30;
			text-shadow: 0 0 12px rgba(255, 150, 200, .6);
			white-space: nowrap;
		}

		#btnContinue.show {
			opacity: .8;
			pointer-events: all;
		}

		#btnContinue:hover {
			opacity: 1 !important;
			color: #fff;
			text-shadow: 0 0 18px rgba(255, 150, 200, 1);
		}

		#btnContinue:active {
			transform: translateX(-50%) scale(.95);
		}

		#letterIcon {
			position: fixed;
			bottom: calc(28px + env(safe-area-inset-bottom));
			right: calc(28px + env(safe-area-inset-right));
			left: auto;
			z-index: 40;
			width: 60px;
			height: 60px;
			border-radius: 50%;
			background: linear-gradient(135deg, #ff6eb4, #cc0066);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-size: 28px;
			box-shadow: 0 0 20px rgba(255, 80, 160, .7);
			opacity: 0;
			pointer-events: none;
			transition: opacity .8s ease;
			animation: iconPulse 2s ease-in-out infinite;
		}

		@keyframes iconPulse {

			0%,
			100% {
				box-shadow: 0 0 20px rgba(255, 80, 160, .5)
			}

			50% {
				box-shadow: 0 0 36px rgba(255, 80, 160, 1)
			}
		}

		#letterIcon.show {
			opacity: 1;
			pointer-events: all;
		}

		#letterModal {
			position: fixed;
			inset: 0;
			z-index: 50;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(0, 0, 0, .6);
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
			opacity: 0;
			pointer-events: none;
			transition: opacity .6s ease;
			padding: 20px;
			padding-bottom: calc(20px + env(safe-area-inset-bottom));
		}

		#letterModal.show {
			opacity: 1;
			pointer-events: all;
		}

		.letterPaper {
			background: linear-gradient(135deg, #fff9fb, #ffe8f3);
			border-radius: 20px;
			padding: 40px 36px;
			max-width: min(500px, 90vw);
			width: 100%;
			box-shadow: 0 20px 80px rgba(255, 80, 160, .35), 0 0 0 1px rgba(255, 150, 200, .3);
			position: relative;
		}

		.letterClose {
			position: absolute;
			top: 14px;
			right: 18px;
			font-size: 22px;
			cursor: pointer;
			color: #cc0066;
			background: none;
			border: none;
		}

		.letterTitle {
			font-family: 'Dancing Script', cursive;
			font-size: 28px;
			color: #8b0055;
			text-align: center;
			margin-bottom: 20px;
		}

		#letterContent {
			font-size: 15px;
			line-height: 1.9;
			color: #5a0030;
			min-height: 60px;
		}

		.cursor {
			display: inline-block;
			width: 2px;
			height: 1em;
			background: #cc0066;
			animation: blink .7s step-end infinite;
			vertical-align: text-bottom;
			margin-left: 1px;
		}

		@keyframes blink {

			0%,
			100% {
				opacity: 1
			}

			50% {
				opacity: 0
			}
		}
	</style>
</head>

<body>
	<svg width="0" height="0" style="position:absolute">
		<defs>
			<linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
				<stop offset="0%" stop-color="#ff6eb4" />
				<stop offset="100%" stop-color="#ff1493" />
			</linearGradient>
		</defs>
	</svg>

	<canvas id="c2d"></canvas>
	<canvas id="c3d"></canvas>
	<canvas id="textCanvas" style="display:none"></canvas>

	<div class="screen active" id="phaseLoading">
		<div class="loadText">Đang tải...</div>
		<div class="loadBarWrap">
			<div class="loadBar" id="loadBar"></div>
		</div>
	</div>
	<div class="screen" id="phaseHold">
		<div id="holdWrap">
			<span id="holdHint">Giữ để mở khóa</span>
			<div id="holdBtn">
				<div class="ring"></div>
				<div class="ring"></div>
				<div class="ring"></div>
				<div class="dot"></div>
				<svg id="progressRing" viewBox="0 0 88 88">
					<circle id="progressCircle" cx="44" cy="44" r="41.8" />
				</svg>
			</div>
		</div>
	</div>
	<div class="screen" id="phaseText"></div>
	<button id="btnContinue">Click xem tiếp nha</button>
	<div id="letterIcon">💌</div>
	<div id="letterModal">
		<div class="letterPaper">
			<button class="letterClose" id="letterClose">✕</button>
			<div class="letterTitle">💌 Lời Nhắn Yêu Thương</div>
			<div id="letterContent"><span class="cursor"></span></div>
		</div>
	</div>

	<script>
		var MP3_URL = './noi_nay_co_anh_3.mp3';
		var PHOTOS = [
			'./file/main.jpg', './file/1.jpg',
			'./file/2.jpg', './file/8.jpg', './file/4.jpg', './file/5.jpg',
			'./file/6.jpg', './file/3.jpg', './file/17.jpg', './file/10.jpg',
			'./file/12.jpg', './file/13.jpg', './file/14.jpg', './file/15.jpg',
			'./file/16.jpg', './file/9.jpg', './file/18.jpg', './file/19.jpg',
		];
		var LETTER_TEXT = 'Chúc em một ngày 8/3 💐✨ thật ý nghĩa bên đó nhé! 🌸🇯🇵\nAnh biết làm việc ở Nhật không hề dễ dàng, nhưng nhìn cách em nỗ lực mỗi ngày, anh thực sự rất ngưỡng mộ. ✨\nChúc cô gái nơi "phương xa" luôn rạng rỡ, bình an và sớm đạt được những dự định của mình.\nĐừng làm việc quá sức, nhớ dành thời gian yêu chiều bản thân một chút nhé! 🎀 Gặt hái thật nhiều thành công, xinh đẹp và luôn nở nụ cười thật tươi nha! 🍀\n\n— From: Anh IT quèn ở Việt Nam! 🇻🇳❤️';

		var c2d = document.getElementById('c2d');
		var ctx = c2d.getContext('2d');
		var W, H, CX, CY;

		function resize() {
			var dpr = window.devicePixelRatio || 1;
			W = (window.visualViewport ? window.visualViewport.width : window.innerWidth);
			H = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
			CX = W / 2; CY = H / 2;
			c2d.width = W * dpr; c2d.height = H * dpr;
			c2d.style.width = W + 'px'; c2d.style.height = H + 'px';
			ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
		}
		resize();

		function onResize() {
			resize();
			if (threeRenderer) {
				threeRenderer.setSize(W, H);
				threeCamera.aspect = W / H;
				threeCamera.updateProjectionMatrix();
			}
		}
		window.addEventListener('resize', onResize);
		if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

		document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

		var PAL = ['rgba(255,30,80,', 'rgba(255,60,120,', 'rgba(255,0,60,', 'rgba(220,20,80,', 'rgba(255,100,140,', 'rgba(255,180,200,'];
		var bgParts = [];
		for (var i = 0; i < 1600; i++) bgParts.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.3 + .3, vx: (Math.random() - .5) * .32, vy: (Math.random() - .5) * .32, ba: Math.random() * .5 + .12, col: PAL[Math.floor(Math.random() * PAL.length)], tw: Math.random() * Math.PI * 2 });
		function updateBg() { for (var p of bgParts) { p.x += p.vx; p.y += p.vy; if (p.x < -2) p.x = W + 2; else if (p.x > W + 2) p.x = -2; if (p.y < -2) p.y = H + 2; else if (p.y > H + 2) p.y = -2; } }
		function drawBg() { var t = Date.now() * .0007; for (var p of bgParts) { var a = p.ba * (.5 + .5 * Math.sin(t + p.tw)); ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.col + a.toFixed(2) + ')'; ctx.fill(); } }
		var sstars = [];
		setInterval(function () { if (sstars.length < 5) sstars.push({ x: Math.random() * W, y: Math.random() * H * .4, len: Math.random() * 130 + 60, spd: Math.random() * 6 + 4, ang: Math.PI / 6 + (Math.random() - .5) * .3, a: 1, w: Math.random() * 1.2 + .4 }); }, 1400);
		function drawStars() { for (var i = sstars.length - 1; i >= 0; i--) { var s = sstars[i]; s.x += Math.cos(s.ang) * s.spd; s.y += Math.sin(s.ang) * s.spd; s.a -= .018; if (s.a <= 0) { sstars.splice(i, 1); continue; } var g = ctx.createLinearGradient(s.x, s.y, s.x - Math.cos(s.ang) * s.len, s.y - Math.sin(s.ang) * s.len); g.addColorStop(0, 'rgba(255,160,210,' + s.a + ')'); g.addColorStop(1, 'rgba(255,100,170,0)'); ctx.save(); ctx.strokeStyle = g; ctx.lineWidth = s.w; ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(255,100,170,.5)'; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - Math.cos(s.ang) * s.len, s.y - Math.sin(s.ang) * s.len); ctx.stroke(); ctx.restore(); } }
		function drawGlow(i) { i = i || 1; var r = Math.min(W, H) * .34 * i; var g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r); g.addColorStop(0, 'rgba(255,80,160,' + (.09 * i) + ')'); g.addColorStop(.5, 'rgba(200,40,130,' + (.045 * i) + ')'); g.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H); }

		var phase = 0;
		var PHASE_IDS = ['phaseLoading', 'phaseHold', 'phaseText', null, null, null];
		function goPhase(n) { phase = n; document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); }); if (PHASE_IDS[n]) { var el = document.getElementById(PHASE_IDS[n]); if (el) el.classList.add('active'); } }

		var audioEl = null;
		function playMusic() { if (audioEl) audioEl.play().catch(function () { }); }

		var loadPct = 0, loadBar = document.getElementById('loadBar');
		var loadTimer = setInterval(function () { loadPct += 2; loadBar.style.width = loadPct + '%'; if (loadPct >= 100) { clearInterval(loadTimer); setTimeout(function () { goPhase(1); }, 300); } }, 60);

		var holdBtn = document.getElementById('holdBtn'), progCirc = document.getElementById('progressCircle');
		var DASHLEN = 263, HOLD_MS = 2200, holding = false, holdStart = 0, unlocked = false;
		function startHold() { if (unlocked) return; if (!audioEl) { audioEl = new Audio(MP3_URL); audioEl.loop = true; audioEl.volume = 0.7; audioEl.load(); } holding = true; holdStart = Date.now(); holdBtn.classList.add('pressing'); }
		function endHold() { if (!holding) return; holding = false; holdBtn.classList.remove('pressing'); if (!unlocked) progCirc.style.strokeDashoffset = DASHLEN; }
		function checkHold() { if (!holding || unlocked) return; var t = Math.min(1, (Date.now() - holdStart) / HOLD_MS); progCirc.style.strokeDashoffset = DASHLEN * (1 - t); if (t >= 1) triggerUnlock(); }
		holdBtn.addEventListener('mousedown', startHold);
		holdBtn.addEventListener('touchstart', function (e) { e.preventDefault(); startHold(); }, { passive: false });
		window.addEventListener('mouseup', endHold); window.addEventListener('touchend', endHold); window.addEventListener('touchcancel', endHold);

		// ====== FIREWORKS SYSTEM (optimized: batch draw by color) ======
		var fireworks = [];
		var rockets = [];
		var fireworkActive = false;

		var FW_PALETTES = [
			['#ff2266', '#ff66aa', '#ff99cc', '#ffccee', '#ffffff'],
			['#ffdd00', '#ff8800', '#ff4400', '#ffaa44', '#ffffaa'],
			['#44ddff', '#ff44cc', '#ffaaff', '#aaffdd', '#ffffff'],
			['#ff44bb', '#ff0066', '#ffaacc', '#cc0055', '#ff88cc'],
			['#00ffaa', '#ff66dd', '#ffff00', '#ff4499', '#aaffff']
		];

		function launchFirework(x, y, palette) {
			var cols = palette || FW_PALETTES[0];
			var count = 80 + Math.floor(Math.random() * 40);
			for (var i = 0; i < count; i++) {
				var ang = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.25;
				var spd = Math.random() * 4.5 + 2;
				fireworks.push({
					x: x, y: y,
					px: x, py: y,   // prev pos for trail (1-segment only, no array)
					vx: Math.cos(ang) * spd,
					vy: Math.sin(ang) * spd,
					alpha: 1,
					col: cols[Math.floor(Math.random() * cols.length)],
					r: Math.random() * 2 + 0.8,
					gravity: 0.06 + Math.random() * 0.03,
					fade: 0.013 + Math.random() * 0.009
				});
			}
		}

		function launchRocket(x) {
			rockets.push({
				x: x || CX + (Math.random() - 0.5) * W * 0.5,
				y: H,
				vy: -(Math.random() * 9 + 13),
				vx: (Math.random() - 0.5) * 1.5,
				targetY: H * 0.12 + Math.random() * H * 0.3,
				px: 0, py: H
			});
		}

		function updateFireworks() {
			var i, p, r;

			// --- rockets ---
			// batch: single style for all rocket trails
			ctx.save();
			ctx.shadowBlur = 0;
			for (i = rockets.length - 1; i >= 0; i--) {
				r = rockets[i];
				r.px = r.x; r.py = r.y;
				r.x += r.vx;
				r.y += r.vy;
				r.vy += 0.22;
				// trail line
				ctx.globalAlpha = 0.55;
				ctx.strokeStyle = '#ffccee';
				ctx.lineWidth = 1.5;
				ctx.beginPath();
				ctx.moveTo(r.px, r.py);
				ctx.lineTo(r.x, r.y);
				ctx.stroke();
				// head dot
				ctx.globalAlpha = 1;
				ctx.fillStyle = '#fff';
				ctx.beginPath();
				ctx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
				ctx.fill();

				if (r.y <= r.targetY || r.vy >= 0) {
					launchFirework(r.x, r.y, FW_PALETTES[Math.floor(Math.random() * FW_PALETTES.length)]);
					rockets.splice(i, 1);
				}
			}
			ctx.restore();

			// --- firework particles: batch by color ---
			// Step 1: update physics
			for (i = fireworks.length - 1; i >= 0; i--) {
				p = fireworks[i];
				p.px = p.x; p.py = p.y;
				p.x += p.vx;
				p.y += p.vy;
				p.vx *= 0.955;
				p.vy *= 0.955;
				p.vy += p.gravity;
				p.alpha -= p.fade;
				if (p.alpha <= 0) { fireworks.splice(i, 1); }
			}

			if (!fireworks.length) return;

			// Step 2: group by color
			var byCol = {};
			for (i = 0; i < fireworks.length; i++) {
				p = fireworks[i];
				if (!byCol[p.col]) byCol[p.col] = [];
				byCol[p.col].push(p);
			}

			// Step 3: draw each color group in one pass (no shadowBlur - use additive glow via globalCompositeOperation)
			ctx.save();
			ctx.globalCompositeOperation = 'lighter';
			for (var col in byCol) {
				var group = byCol[col];
				ctx.strokeStyle = col;
				ctx.fillStyle = col;
				// trails
				ctx.lineWidth = 1;
				ctx.beginPath();
				for (i = 0; i < group.length; i++) {
					p = group[i];
					if (p.alpha <= 0) continue;
					ctx.globalAlpha = p.alpha * 0.25;

					}

		var LINES = ['Chúc Mừng', 'Ngày Quốc Tế', 'Phụ Nữ 🌸'];

				ctx.beginPath();
				for (i = 0; i < line.parts.length; i++) {
					p = line.parts[i];
					if (p.alpha <= 0 || p.t < 0) continue;
					ctx.moveTo(p.cx + p.r, p.cy);
					ctx.arc(p.cx, p.cy, p.r, 0, Math.PI * 2);
				}
				ctx.fill();
			}
			ctx.restore();
		}

		function startTextExplode() {
			if (!particleTextState) { startAssemble(); return; }
			// Mỗi particle nhận vận tốc hướng ra ngoài từ tâm dòng chữ
			for (var li = 0; li < particleTextState.lines.length; li++) {
				var line = particleTextState.lines[li];
				if (!line) continue;
				line.exploding = true;
				for (var i = 0; i < line.parts.length; i++) {
					var p = line.parts[i];
					var dx = p.cx - CX, dy = p.cy - CY;
					var len = Math.sqrt(dx * dx + dy * dy) || 1;
					var spd = 2.5 + Math.random() * 3.5;
					p.ex = dx / len * spd + (Math.random() - 0.5) * 1.5;
					p.ey = dy / len * spd + (Math.random() - 0.5) * 1.5;
				}
			}
			// Chờ particles bay hết rồi chuyển sang ảnh
			setTimeout(function () {
				particleTextState = null;
				startAssemble();
			}, 1000);
		}

		var imgObjs = new Array(PHOTOS.length).fill(null);
		PHOTOS.forEach(function (src, i) { var img = new Image(); img.onload = function () { imgObjs[i] = img; }; img.onerror = function () { imgObjs[i] = null; }; img.src = src; });
		function validImgs() { return imgObjs.filter(function (x) { return x && x.naturalWidth > 0; }); }

		var assembleState = null;
		function startAssemble() {
			goPhase(3);
			var img = validImgs()[0];
			if (!img) { setTimeout(startSphere, 1000); return; }
			var TW = Math.min(W * .6, 320), TH = TW * (img.naturalHeight / img.naturalWidth) || TW * 1.3;
			var COLS = 12, ROWS = Math.round(COLS * (TH / TW)), pw = TW / COLS, ph = TH / ROWS;
			var ox = CX - TW / 2, oy = CY - TH / 2, pieces = [];
			for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
				var tx = ox + c * pw, ty = oy + r * ph;
				var angle = Math.random() * Math.PI * 2, dist = Math.random() * Math.max(W, H) * .7 + 100;
				pieces.push({
					sx: tx + Math.cos(angle) * dist, sy: ty + Math.sin(angle) * dist,
					tx: tx, ty: ty, pw: pw, ph: ph,
					sx0: c * pw / TW * img.naturalWidth, sy0: r * ph / TH * img.naturalHeight,
					sw: pw / TW * img.naturalWidth, sh: ph / TH * img.naturalHeight,
					t: 0, phase: 'assemble', cx: 0, cy: 0,
					vx: 0, vy: 0, spin: 0, spinV: (Math.random() - .5) * .08, alpha: 1
				});
			}
			assembleState = { img: img, pieces: pieces, TW: TW, TH: TH, ox: ox, oy: oy, holdStart: null, shatterStarted: false };
		}

		function updateAssemble() {
			if (!assembleState) return;
			var img = assembleState.img, pieces = assembleState.pieces, TW = assembleState.TW, TH = assembleState.TH;
			var allDone = true;
			for (var i = 0; i < pieces.length; i++) {
				var p = pieces[i];
				if (p.phase === 'assemble') {
					p.t = Math.min(1, p.t + .016);
					var e = 1 - Math.pow(1 - p.t, 3);
					p.cx = p.sx + (p.tx - p.sx) * e; p.cy = p.sy + (p.ty - p.sy) * e;
					if (p.t < 1) allDone = false;
				} else if (p.phase === 'shatter') {
					p.vx *= .97; p.vy *= .97; p.vy += .08;
					p.cx += p.vx; p.cy += p.vy;
					p.spin += p.spinV; p.alpha -= .018;
					if (p.alpha > 0) allDone = false;
				}
			}
			for (var i = 0; i < pieces.length; i++) {
				var p = pieces[i];
				if (p.alpha <= 0) continue;
				ctx.save(); ctx.globalAlpha = p.alpha;
				ctx.translate((p.cx || p.tx) + p.pw / 2, (p.cy || p.ty) + p.ph / 2);
				if (p.spin) ctx.rotate(p.spin);
				ctx.translate(-p.pw / 2, -p.ph / 2);
				ctx.drawImage(img, p.sx0, p.sy0, p.sw, p.sh, 0, 0, p.pw, p.ph);
				ctx.restore();
			}
			if (assembleState.holdStart) {
				var prog = Math.min(1, (Date.now() - assembleState.holdStart) / 500);
				ctx.save(); ctx.shadowBlur = 30 * prog; ctx.shadowColor = 'rgba(255,80,160,.9)';
				ctx.strokeStyle = 'rgba(255,120,190,' + (0.7 * prog) + ')'; ctx.lineWidth = 3;
				ctx.strokeRect(assembleState.ox, assembleState.oy, TW, TH); ctx.restore();
			}
			if (allDone && pieces[0] && pieces[0].phase === 'assemble' && !assembleState.shatterStarted) {
				assembleState.holdStart = Date.now(); assembleState.shatterStarted = true;
				setTimeout(startShatter, 2000);
			}
			if (allDone && pieces[0] && pieces[0].phase === 'shatter') {
				assembleState = null; setTimeout(startSphere, 400);
			}
		}

		function startShatter() {
			if (!assembleState) return;
			for (var i = 0; i < assembleState.pieces.length; i++) {
				var p = assembleState.pieces[i]; p.phase = 'shatter';
				var angle = Math.random() * Math.PI * 2, spd = Math.random() * 4 + 1;
				p.vx = Math.cos(angle) * spd; p.vy = Math.sin(angle) * spd - 1.5;
				p.cx = p.tx; p.cy = p.ty;
			}
		}

		var threeScene = null, threeCamera = null, threeRenderer = null;
		var sphereGroup = null, threeRunning = false, threeStars = null;

		function initThree() {
			if (typeof THREE === 'undefined') return false;
			var c3d = document.getElementById('c3d');
			var isMobile = /Mobi|Android/i.test(navigator.userAgent);
			threeScene = new THREE.Scene();
			threeCamera = new THREE.PerspectiveCamera(60, W / H, 0.1, 1000);
			threeCamera.position.z = isMobile ? 10 : 13;
			threeRenderer = new THREE.WebGLRenderer({ canvas: c3d, antialias: true, alpha: true, powerPreference: 'high-performance' });
			threeRenderer.setSize(W, H);
			threeRenderer.setPixelRatio(window.devicePixelRatio);
			threeRenderer.setClearColor(0x000000, 0);
			return true;
		}

		function startSphere() {
			var valid = validImgs();
			if (valid.length < 2) { setTimeout(startSphere, 600); return; }
			if (typeof THREE === 'undefined') {
				var s = document.createElement('script');
				s.src = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';
				s.onload = function () { buildSphere(valid); };
				s.onerror = function () { startFlying(); };
				document.head.appendChild(s);
				return;
			}
			buildSphere(valid);
		}

		function buildSphere(valid) {
			goPhase(4);
			var c3d = document.getElementById('c3d');
			c3d.classList.add('active');
			if (!threeScene && !initThree()) { c3d.classList.remove('active'); startFlying(); return; }
			if (sphereGroup) { sphereGroup.traverse(function (o) { if (o.geometry) o.geometry.dispose(); if (o.material && o.material.map) o.material.map.dispose(); if (o.material) o.material.dispose(); }); threeScene.remove(sphereGroup); }
			if (threeStars) threeScene.remove(threeStars);

			sphereGroup = new THREE.Group();
			threeScene.add(sphereGroup);

			var isMobile = /Mobi|Android/i.test(navigator.userAgent);
			var camZ = isMobile ? 10 : 13;
			threeCamera.position.z = camZ;
			var visH = 2 * Math.tan(Math.PI / 6) * camZ;
			var visW = visH * (W / H);
			var radius = Math.min(visH, visW) * 0.72 / 2;

			var ROWS = 7, meshList = [], imgIdx = 0;
			var aspect = valid[0].naturalWidth / valid[0].naturalHeight || 0.8;
			var matList = valid.map(function (img) { var t = new THREE.Texture(img); t.minFilter = THREE.LinearFilter; t.magFilter = THREE.LinearFilter; t.generateMipmaps = false; t.needsUpdate = true; return new THREE.MeshBasicMaterial({ map: t, side: THREE.FrontSide }); });

			for (var ri = 0; ri < ROWS; ri++) {
				var phi = Math.PI * (ri + 0.5) / ROWS, dPhi = Math.PI / ROWS;
				var ringR = radius * Math.sin(phi), arcH = dPhi * radius;
				var COLS = Math.max(3, Math.round(2 * Math.PI * ringR / (arcH * aspect)));
				var tileW = (2 * Math.PI * ringR / COLS) * 1.15, tileH = arcH * 1.15;
				var geo = new THREE.PlaneGeometry(tileW, tileH);
				for (var ci = 0; ci < COLS; ci++) {
					var theta = (2 * Math.PI * (ci + 0.5)) / COLS;
					var fx = radius * Math.sin(phi) * Math.cos(theta), fy = radius * Math.cos(phi), fz = radius * Math.sin(phi) * Math.sin(theta);
					var mesh = new THREE.Mesh(geo, matList[imgIdx % matList.length]); imgIdx++;
					mesh.position.set(fx, fy, fz); mesh.lookAt(0, 0, 0); mesh.rotateY(Math.PI);
					var ang = Math.random() * Math.PI * 2, elv = (Math.random() - .5) * Math.PI, d = radius * 4 + Math.random() * radius * 2;
					mesh.userData = { fx: fx, fy: fy, fz: fz, sx: Math.cos(elv) * Math.cos(ang) * d, sy: Math.sin(elv) * d * 0.5, sz: Math.cos(elv) * Math.sin(ang) * d, t: -(Math.random() * 0.9) };
					mesh.position.set(mesh.userData.sx, mesh.userData.sy, mesh.userData.sz);
					sphereGroup.add(mesh); meshList.push(mesh);
				}
			}

			var sp = []; for (var i = 0; i < 800; i++)sp.push((Math.random() - .5) * 120, (Math.random() - .5) * 120, (Math.random() - .5) * 120);
			var sg = new THREE.BufferGeometry(); sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
			threeStars = new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xff66cc, size: 0.2 }));
			threeScene.add(threeStars);

			threeRunning = true;
			setTimeout(function () { document.getElementById('btnContinue').classList.add('show'); }, 6000);

			var velY = 0.003, velX = 0.0003, isDragging = false, dragStart3 = null;
			c3d.addEventListener('mousedown', function (e) { isDragging = true; dragStart3 = { x: e.clientX, y: e.clientY }; velY = 0; velX = 0; });
			c3d.addEventListener('touchstart', function (e) { isDragging = true; dragStart3 = { x: e.touches[0].clientX, y: e.touches[0].clientY }; velY = 0; velX = 0; }, { passive: true });
			c3d.addEventListener('mousemove', function (e) { if (!isDragging || !dragStart3) return; var dx = e.clientX - dragStart3.x, dy = e.clientY - dragStart3.y; velY = dx * 0.004; velX = dy * 0.004; sphereGroup.rotation.y += dx * 0.004; sphereGroup.rotation.x += dy * 0.004; dragStart3 = { x: e.clientX, y: e.clientY }; });
			c3d.addEventListener('touchmove', function (e) { if (!isDragging || !dragStart3) return; var dx = e.touches[0].clientX - dragStart3.x, dy = e.touches[0].clientY - dragStart3.y; velY = dx * 0.004; velX = dy * 0.004; sphereGroup.rotation.y += dx * 0.004; sphereGroup.rotation.x += dy * 0.004; dragStart3 = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
			window.addEventListener('mouseup', function () { isDragging = false; dragStart3 = null; });
			window.addEventListener('touchend', function () { isDragging = false; dragStart3 = null; });

			function threeLoop() {
				if (!threeRunning) return;
				requestAnimationFrame(threeLoop);
				for (var i = 0; i < meshList.length; i++) { var u = meshList[i].userData; if (u.t < 1) u.t = Math.min(1, u.t + 0.016); if (u.t <= 0) continue; var e = 1 - Math.pow(1 - Math.max(0, u.t), 3); meshList[i].position.x = u.sx + (u.fx - u.sx) * e; meshList[i].position.y = u.sy + (u.fy - u.sy) * e; meshList[i].position.z = u.sz + (u.fz - u.sz) * e; }
				if (!isDragging) { velY += (0.003 - velY) * 0.03; velX += (0 - velX) * 0.05; }
				sphereGroup.rotation.y += velY;
				sphereGroup.rotation.x = Math.max(-0.5, Math.min(0.5, sphereGroup.rotation.x + velX));
				if (threeStars) threeStars.rotation.y -= 0.0004;
				threeRenderer.render(threeScene, threeCamera);
			}
			threeLoop();
		}

		function stopSphere() { threeRunning = false; document.getElementById('c3d').classList.remove('active'); }

		var flyingPhotos = [], flyPhase = false;
		function startFlying() {
			stopSphere(); goPhase(5); flyPhase = true;
			var btn = document.getElementById('btnContinue'); btn.style.display = ''; btn.classList.remove('show');
			flyingPhotos = [];
			var valid = validImgs();
			for (var i = 0; i < valid.length; i++) { var img = valid[i], w = Math.random() * 90 + 80, h = w * (img.naturalHeight / img.naturalWidth) || w * 1.3; flyingPhotos.push({ img: img, x: Math.random() * W, y: H + h + Math.random() * 300, w: w, h: h, vx: (Math.random() - .5) * 1.2, vy: -(Math.random() * 1.5 + 1.2), rot: (Math.random() - .5) * .3, rotV: (Math.random() - .5) * .005, alpha: 1, glowAnim: Math.random() * Math.PI * 2 }); }
			setTimeout(function () { document.getElementById('letterIcon').classList.add('show'); }, 8000);
		}
		function updateFlying() { if (!flyPhase) return; for (var p of flyingPhotos) { p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.glowAnim += .06; if (p.y + p.h < -50) { p.y = H + p.h; p.x = Math.random() * W; } var glow = .5 + .5 * Math.sin(p.glowAnim); ctx.save(); ctx.translate(p.x + p.w / 2, p.y + p.h / 2); ctx.rotate(p.rot); ctx.shadowBlur = 14 + 10 * glow; ctx.shadowColor = 'rgba(255,' + (80 + 60 * glow | 0) + ',160,' + (0.7 + 0.3 * glow) + ')'; ctx.strokeStyle = 'rgba(255,' + (100 + 80 * glow | 0) + ',180,' + (0.6 + 0.4 * glow) + ')'; ctx.lineWidth = 2 + glow * 2; ctx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.drawImage(p.img, -p.w / 2, -p.h / 2, p.w, p.h); ctx.restore(); } }

		document.getElementById('btnContinue').addEventListener('click', function () { var btn = document.getElementById('btnContinue'); btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; setTimeout(function () { btn.style.display = 'none'; }, 0); startFlying(); });

		var letterTyping = false;
		document.getElementById('letterIcon').addEventListener('click', openLetter);
		document.getElementById('letterClose').addEventListener('click', function () { document.getElementById('letterModal').classList.remove('show'); });
		function openLetter() { document.getElementById('letterModal').classList.add('show'); if (!letterTyping) typeLetter(); }
		function typeLetter() { letterTyping = true; var el = document.getElementById('letterContent'); var i = 0; el.innerHTML = '<span class="cursor"></span>'; function type() { if (i >= LETTER_TEXT.length) { letterTyping = false; return; } var ch = LETTER_TEXT[i++]; el.innerHTML = LETTER_TEXT.substring(0, i).replace(/\n/g, '<br>') + '<span class="cursor"></span>'; setTimeout(type, ch === '\n' ? 400 : ch === ' ' ? 60 : Math.random() * 55 + 25); } setTimeout(type, 600); }

		function loop() {
			requestAnimationFrame(loop);
			ctx.fillStyle = 'rgba(0,0,0,.16)'; ctx.fillRect(0, 0, W, H);
			drawGlow(.8 + .2 * Math.sin(Date.now() * .0008));
			updateBg(); drawBg(); drawStars();
			// NEW: fireworks + flower
			updateFireworks();
			updateFlowerBouquet();
			checkHold(); updateParticleText(); updateAssemble(); updateFlying();
		}
		loop();
	</script>
