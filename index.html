<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Happy Women's Day 🌸</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #000;
			font-family: 'Quicksand', sans-serif;
			touch-action: none;
		}

		canvas {
			display: block;
			position: fixed;
			top: 0;
			left: 0;
			z-index: 0;
		}

		#ytPlayer {
			position: fixed;
			width: 1px;
			height: 1px;
			opacity: 0;
			pointer-events: none;
			top: -9999px;
		}

		.screen {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity 1s ease;
		}

		.screen.active {
			opacity: 1;
			pointer-events: all;
		}

		/* ── LOADING SCREEN ── */
		#phaseLoading {
			background: transparent;
		}

		.loadDots {
			display: flex;
			gap: 10px;
			margin-top: 18px;
		}

		.loadDot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: rgba(255, 130, 190, .7);
			animation: dotBounce 1.2s ease-in-out infinite;
		}

		.loadDot:nth-child(2) {
			animation-delay: .2s;
		}

		.loadDot:nth-child(3) {
			animation-delay: .4s;
		}

		@keyframes dotBounce {

			0%,
			100% {
				transform: translateY(0);
				opacity: .4;
			}

			50% {
				transform: translateY(-8px);
				opacity: 1;
			}
		}

		.loadText {
			color: rgba(225, 120, 136, 0.7);
			font-weight: bold;
			font-size: 13px;
			letter-spacing: 4px;
			text-transform: uppercase;
			text-shadow: 0 0 10px rgba(255, 100, 180, .5);
		}

		/* ── HOLD SCREEN ── */
		#phaseHold {
			justify-content: flex-end;
			padding-bottom: 90px;
		}

		#holdWrap {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 28px;
		}

		/* gap 28px thay vì 16 */
		#holdHint {
			color: rgba(255, 182, 193, .85);
			font-size: 13px;
			letter-spacing: 3px;
			text-transform: uppercase;
			text-shadow: 0 0 12px rgba(255, 100, 180, .6);
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {

			0%,
			100% {
				opacity: .5;
			}

			50% {
				opacity: 1;
			}
		}

		#holdBtn {
			position: relative;
			width: 80px;
			height: 80px;
			cursor: pointer;
			user-select: none;
			-webkit-user-select: none;
		}

		.ring {
			position: absolute;
			inset: 0;
			border-radius: 50%;
			border: 1.5px solid rgba(255, 130, 190, .35);
			animation: ringPulse 2.5s ease-in-out infinite;
		}

		.ring:nth-child(2) {
			animation-delay: .6s;
			transform: scale(1.28);
		}

		.ring:nth-child(3) {
			animation-delay: 1.2s;
			transform: scale(1.58);
		}

		@keyframes ringPulse {

			0%,
			100% {
				opacity: .2;
			}

			50% {
				opacity: .75;
			}
		}

		.dot {
			position: absolute;
			inset: 8px;
			border-radius: 50%;
			background: radial-gradient(circle at 40% 35%, #ff9ec4, #d9006e 60%, #8b0038);
			box-shadow: 0 0 18px 6px rgba(255, 80, 160, .55), 0 0 40px 12px rgba(200, 0, 120, .25);
			transition: transform .15s, box-shadow .15s;
		}

		#holdBtn.pressing .dot {
			transform: scale(.88);
			box-shadow: 0 0 28px 12px rgba(255, 80, 160, .85), 0 0 60px 20px rgba(200, 0, 120, .45);
		}

		#progressRing {
			position: absolute;
			inset: -4px;
			width: calc(100%+8px);
			height: calc(100%+8px);
			transform: rotate(-90deg);
			pointer-events: none;
		}

		#progressCircle {
			fill: none;
			stroke: url(#grad);
			stroke-width: 2.5;
			stroke-linecap: round;
			stroke-dasharray: 263;
			stroke-dashoffset: 263;
			transition: stroke-dashoffset .05s linear;
			filter: drop-shadow(0 0 4px rgba(255, 100, 180, 1));
		}

		/* ── PARTICLE TEXT ── */
		#phaseText {
			background: transparent;
			pointer-events: none;
		}

		/* ── CONTINUE BTN — dưới quả cầu, không dính ── */
		#btnContinue {
			position: fixed;
			bottom: 28px;
			left: 50%;
			transform: translateX(-50%);
			padding: 0;
			background: none;
			color: rgba(255, 255, 255, .75);
			font-family: 'Quicksand', sans-serif;
			font-size: 14px;
			letter-spacing: 2px;
			border: none;
			cursor: pointer;
			opacity: 0;
			pointer-events: none;
			transition: opacity .8s ease, color .2s, transform .15s;
			z-index: 30;
			text-shadow: 0 0 12px rgba(255, 150, 200, .6);
			white-space: nowrap;
		}

		#btnContinue.show {
			opacity: .8;
			pointer-events: all;
		}

		#btnContinue:hover {
			opacity: 1 !important;
			color: #fff;
			text-shadow: 0 0 18px rgba(255, 150, 200, 1);
		}

		#btnContinue:active {
			transform: translateX(-50%) scale(.95);
		}

		/* ── LETTER ── */
		#letterIcon {
			position: fixed;
			bottom: 28px;
			right: 28px;
			z-index: 40;
			width: 56px;
			height: 56px;
			border-radius: 50%;
			background: linear-gradient(135deg, #ff6eb4, #cc0066);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-size: 26px;
			box-shadow: 0 0 20px rgba(255, 80, 160, .7);
			opacity: 0;
			pointer-events: none;
			transition: opacity .8s ease;
			animation: iconPulse 2s ease-in-out infinite;
		}

		@keyframes iconPulse {

			0%,
			100% {
				box-shadow: 0 0 20px rgba(255, 80, 160, .5);
			}

			50% {
				box-shadow: 0 0 36px rgba(255, 80, 160, 1);
			}
		}

		#letterIcon.show {
			opacity: 1;
			pointer-events: all;
		}

		#letterModal {
			position: fixed;
			inset: 0;
			z-index: 50;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(0, 0, 0, .6);
			backdrop-filter: blur(6px);
			opacity: 0;
			pointer-events: none;
			transition: opacity .6s ease;
		}

		#letterModal.show {
			opacity: 1;
			pointer-events: all;
		}

		.letterPaper {
			background: linear-gradient(135deg, #fff9fb, #ffe8f3);
			border-radius: 20px;
			padding: 40px 36px;
			max-width: min(500px, 90vw);
			width: 100%;
			box-shadow: 0 20px 80px rgba(255, 80, 160, .35), 0 0 0 1px rgba(255, 150, 200, .3);
			position: relative;
		}

		.letterClose {
			position: absolute;
			top: 14px;
			right: 18px;
			font-size: 22px;
			cursor: pointer;
			color: #cc0066;
			background: none;
			border: none;
		}

		.letterTitle {
			font-family: 'Dancing Script', cursive;
			font-size: 28px;
			color: #8b0055;
			text-align: center;
			margin-bottom: 20px;
		}

		#letterContent {
			font-size: 15px;
			line-height: 1.9;
			color: #5a0030;
			min-height: 60px;
		}

		.cursor {
			display: inline-block;
			width: 2px;
			height: 1em;
			background: #cc0066;
			animation: blink .7s step-end infinite;
			vertical-align: text-bottom;
			margin-left: 1px;
		}

		@keyframes blink {

			0%,
			100% {
				opacity: 1;
			}

			50% {
				opacity: 0;
			}
		}
	</style>
</head>

<body>
	<div id="ytPlayer"></div>
	<svg width="0" height="0" style="position:absolute">
		<defs>
			<linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
				<stop offset="0%" stop-color="#ff6eb4" />
				<stop offset="100%" stop-color="#ff1493" />
			</linearGradient>
		</defs>
	</svg>
	<canvas id="c"></canvas>
	<canvas id="textCanvas" style="display:none"></canvas>

	<!-- LOADING -->
	<div class="screen active" id="phaseLoading">
		<div class="loadText">Đang tải</div>
		<div class="loadDots">
			<div class="loadDot"></div>
			<div class="loadDot"></div>
			<div class="loadDot"></div>
		</div>
	</div>

	<!-- HOLD -->
	<div class="screen" id="phaseHold">
		<div id="holdWrap">
			<span id="holdHint">Giữ để mở khóa</span>
			<div id="holdBtn">
				<div class="ring"></div>
				<div class="ring"></div>
				<div class="ring"></div>
				<div class="dot"></div>
				<svg id="progressRing" viewBox="0 0 88 88">
					<circle id="progressCircle" cx="44" cy="44" r="41.8" />
				</svg>
			</div>
		</div>
	</div>

	<!-- PARTICLE TEXT -->
	<div class="screen" id="phaseText"></div>

	<!-- CONTINUE -->
	<button id="btnContinue">Click xem tiếp nha</button>

	<!-- LETTER -->
	<div id="letterIcon">💌</div>
	<div id="letterModal">
		<div class="letterPaper">
			<button class="letterClose" id="letterClose">✕</button>
			<div class="letterTitle">💌 Lời Nhắn Yêu Thương</div>
			<div id="letterContent"><span class="cursor"></span></div>
		</div>
	</div>

				}
			}
			for (const p of pieces) {
				if (p.alpha <= 0) continue;
				ctx.save(); ctx.globalAlpha = p.alpha;
				ctx.translate((p.cx || p.tx) + p.pw / 2, (p.cy || p.ty) + p.ph / 2);
				if (p.spin) ctx.rotate(p.spin); ctx.translate(-p.pw / 2, -p.ph / 2);
				ctx.drawImage(img, p.sx0, p.sy0, p.sw, p.sh, 0, 0, p.pw, p.ph); ctx.restore();
			}
			if (assembleState.holdStart) {
				const prog = Math.min(1, (Date.now() - assembleState.holdStart) / 500);
				ctx.save(); ctx.shadowBlur = 30 * prog; ctx.shadowColor = 'rgba(255,80,160,.9)';
				ctx.strokeStyle = `rgba(255,120,190,${.7 * prog})`; ctx.lineWidth = 3;
				ctx.strokeRect(assembleState.ox, assembleState.oy, TW, TH); ctx.restore();
			}
			if (allDone && pieces[0]?.phase === 'assemble' && !assembleState.shatterStarted) {
				assembleState.holdStart = Date.now(); assembleState.shatterStarted = true; setTimeout(startShatter, 2000);
			}
			if (allDone && pieces[0]?.phase === 'shatter') { assembleState = null; setTimeout(startSphere, 400); }
		}
		function startShatter() {
			if (!assembleState) return;
			for (const p of assembleState.pieces) {
				p.phase = 'shatter';
				const angle = Math.random() * Math.PI * 2, spd = Math.random() * 8 + 2;
				p.vx = Math.cos(angle) * spd; p.vy = Math.sin(angle) * spd - 3; p.cx = p.tx; p.cy = p.ty;
			}
		}

		/* ══ PHASE 4: IMAGE SPHERE — UV grid, no border, large tiles ══ */
		let sphereData = null;
		function startSphere() {
			goPhase(4);
			document.getElementById('btnContinue').classList.add('show');
			const valid = imgObjs.filter(x => x && x.naturalWidth > 0);
			if (!valid.length) { setTimeout(startFlying, 500); return; }

			/* 7 rows × 12 cols = 84 tiles, ảnh to rõ hơn */
			const ROWS_S = 7, COLS_S = 12;
			const R = Math.min(W, H) * .43;
			const tiles = [];
			for (let ri = 0; ri < ROWS_S; ri++) {
				for (let ci = 0; ci < COLS_S; ci++) {
					const phi = Math.PI * (ri + .5) / ROWS_S;
					const theta = 2 * Math.PI * (ci + .5) / COLS_S;
					tiles.push({
						ox: Math.sin(phi) * Math.cos(theta) * R,
						oy: -Math.cos(phi) * R,
						oz: Math.sin(phi) * Math.sin(theta) * R,
						phi, theta, R,
						dPhi: Math.PI / ROWS_S,
						dTheta: 2 * Math.PI / COLS_S,
						img: valid[(ri * COLS_S + ci) % valid.length],
						t: 0,
						ex: (Math.random() - .5) * W * 1.5,
						ey: (Math.random() - .5) * H * 1.5,
						ez: (Math.random() - .5) * 900,
					});
				}
			}
			sphereData = { tiles, rotY: 0, rotX: .12 };
		}

		function updateSphere() {
			if (!sphereData) return;
			sphereData.rotY += .0045;
			const { tiles, rotY, rotX } = sphereData;
			const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
			const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

			const rendered = [];
			for (const t of tiles) {
				t.t = Math.min(1, t.t + .013);
				const e = 1 - Math.pow(1 - t.t, 3);
				const wx = t.ex * (1 - e) + t.ox * e;
				const wy = t.ey * (1 - e) + t.oy * e;
				const wz = t.ez * (1 - e) + t.oz * e;
				// rotate Y axis
				const rx1 = wx * cosY + wz * sinY;
				const rz1 = -wx * sinY + wz * cosY;
				// rotate X axis (tilt)
				const ry2 = wy * cosX - rz1 * sinX;
				const rz2 = wy * sinX + rz1 * cosX;

				const FOV = 860, depth = FOV + rz2 + 320, sc = FOV / depth;
				const sx = CX + rx1 * sc, sy = CY + ry2 * sc;

				/* tile size: arc-length based, +15% gap compensation so tiles overlap slightly */
				const tw = 2 * t.R * Math.sin(t.phi) * Math.sin(t.dTheta / 2) * sc * e * 1.18;
				const th = 2 * t.R * Math.sin(t.dPhi / 2) * sc * e * 1.18;

				const alpha = Math.max(0, Math.min(1, (.15 + .85 * sc) * e));
				if (tw < 2 || th < 2 || alpha < .03) continue;
				rendered.push({ sx, sy, tw, th, depth: rz2, img: t.img, alpha, sc });
			}
			rendered.sort((a, b) => a.depth - b.depth);

			for (const t of rendered) {
				ctx.save();
				ctx.globalAlpha = t.alpha;
				// NO border, NO stroke — just draw image
				ctx.drawImage(t.img, t.sx - t.tw / 2, t.sy - t.th / 2, t.tw, t.th);
				// back-hemisphere shadow for 3D feel
				if (t.depth > 50) {
					ctx.fillStyle = `rgba(0,0,0,${Math.min(.6, t.depth / 700)})`;
					ctx.fillRect(t.sx - t.tw / 2, t.sy - t.th / 2, t.tw, t.th);
				}
				ctx.restore();
			}

			// no vignette ring
		}

		/* ══ PHASE 5: FLYING PHOTOS (unchanged) ══ */
		let flyingPhotos = [], flyPhase = false;
		function startFlying() {
			goPhase(5); flyPhase = true; flyingPhotos = [];
			const valid = imgObjs.filter(x => x && x.naturalWidth > 0);
			for (let i = 0; i < valid.length; i++) {
				const img = valid[i];
				const w = Math.random() * 90 + 80, h = w * (img.naturalHeight / img.naturalWidth) || w * 1.3;
				flyingPhotos.push({
					img, x: Math.random() * W, y: H + h + Math.random() * 300, w, h,
					vx: (Math.random() - .5) * 1.2, vy: -(Math.random() * 1.5 + 1.2),
					rot: (Math.random() - .5) * .3, rotV: (Math.random() - .5) * .005,
					alpha: 1, glowAnim: Math.random() * Math.PI * 2,
				});
			}
			setTimeout(() => document.getElementById('letterIcon').classList.add('show'), 3000);
		}
		function updateFlying() {
			if (!flyPhase) return;
			for (const p of flyingPhotos) {
				p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.glowAnim += .06;
				if (p.y + p.h < -50) { p.y = H + p.h; p.x = Math.random() * W; }
				const glow = .5 + .5 * Math.sin(p.glowAnim);
				ctx.save(); ctx.translate(p.x + p.w / 2, p.y + p.h / 2); ctx.rotate(p.rot);
				ctx.shadowBlur = 14 + 10 * glow; ctx.shadowColor = `rgba(255,${80 + 60 * glow | 0},160,${.7 + .3 * glow})`;
				ctx.strokeStyle = `rgba(255,${100 + 80 * glow | 0},180,${.6 + .4 * glow})`; ctx.lineWidth = 2 + glow * 2;
				ctx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
				ctx.drawImage(p.img, -p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
			}
		}

		document.getElementById('btnContinue').addEventListener('click', () => {
			document.getElementById('btnContinue').classList.remove('show');
			sphereData = null; startFlying();
		});

		/* ══ LETTER ══ */
		let letterTyping = false;
		document.getElementById('letterIcon').addEventListener('click', openLetter);
		document.getElementById('letterClose').addEventListener('click', () => document.getElementById('letterModal').classList.remove('show'));
		function openLetter() { document.getElementById('letterModal').classList.add('show'); if (!letterTyping) typeLetter(); }
		function typeLetter() {
			letterTyping = true; const el = document.getElementById('letterContent');
			let i = 0; el.innerHTML = '<span class="cursor"></span>';
			function type() {
				if (i >= LETTER_TEXT.length) { letterTyping = false; return; }
				const ch = LETTER_TEXT[i++];
				el.innerHTML = LETTER_TEXT.substring(0, i).replace(/\n/g, '<br>') + '<span class="cursor"></span>';
				setTimeout(type, ch === '\n' ? 400 : ch === ' ' ? 60 : Math.random() * 55 + 25);
			}
			setTimeout(type, 600);
		}

		/* ══ MAIN LOOP ══ */
		function loop() {
			requestAnimationFrame(loop);
			ctx.fillStyle = 'rgba(0,0,0,.16)'; ctx.fillRect(0, 0, W, H);
			drawGlow(.8 + .2 * Math.sin(Date.now() * .0008));
			updateBg(); drawBg();
			drawStars();
			checkHold();
			updateParticleText();
			updateAssemble();
			updateSphere();
			updateFlying();
		}
		loop();
	</script>
</body>
